<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domfit</title>
    <link rel="shortcut icon" href="img/LogoDOMFIT.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/a03488ad81.js" crossorigin="anonymous"></script>
</head>

<body>
    <!-- cabecalho do site -->
    <header class="cabecalho">

        <div class="img-header">
            <img src="img/LogoDOMFIT.png" alt="Logo domfit">
        </div>

        <div class="btn">
            <a href="">
                <button>INSCREVA-SE</button>
            </a>
        </div>
    </header>

    <main>
        <!-- section 01 -->

        <section class="section01">
            <div class="div01">
                <p>Transforme sua rotina e alcance seus objetivos na nossa academia!  <br><span>Aqui, você conta com acompanhamento profissional qualificado.</span></p>
                <nav>
                    <ul class="ul-div01">
                        <li>
                            <a href="">Matricula</a>
                        </li>

                        <li>
                            <a href="">Horários</a>
                        </li>

                        <li>
                            <a href="">Telefone</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </section>

        <!-- section 02 -->

        <section class="section02">
            <div class="caixa"><img src="" alt=""></div>
            <div class="caixa"><img src="" alt=""></div>
            <div class="caixa"><img src="" alt=""></div>
        </section>

        <!-- section 03 -->

        <section class="section03">
            <!-- caixa 1 -->
            <div class="div03 caixa1"></div>
            <!-- caixa 2 -->
            <div class="div03 caixa2"></div>
        </section>

        <!-- section 04 -->

        <section class="section04">
            <div class="caixa"></div>
            <p></p>

            <div class="caixa"></div>
            <p></p>

            <div class="caixa"></div>
            <p></p>
        </section>
    </main>

    <!-- botão whattsapp -->

    <a href="">
        <div class="whatsapp">
            <img src="img/whatsapp.png" alt="icon whatsapp">
        </div>
    </a>

    <footer class="rodape">
        <div class="content">
            <div class="div-list"></div>
            <div class="div-list"></div>
            <div class="div-list"></div>
        </div>


        <hr class="line">

        <div class="social-media">
            <i class="fa-brands fa-youtube"></i>
            <i class="fa-brands fa-tiktok"></i>
            <i class="fa-brands fa-facebook"></i>
        </div>
    </footer>

    <!-- libras para maior acessebilidade -->

    <div vw class="enabled">
        <div vw-access-button class="active"></div>
        <div vw-plugin-wrapper>
            <div class="vw-plugin-top-wrapper"></div>
        </div>
    </div>
    <script src="https://vlibras.gov.br/app/vlibras-plugin.js"></script>
    <script>
        new window.VLibras.Widget('https://vlibras.gov.br/app');
    </script>

</body>

</html>
