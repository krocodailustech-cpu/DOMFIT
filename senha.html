<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>esqueci senha</title>
    <link rel="stylesheet" href="senha.css">
</head>

<body>

    <!-- LADO ESQUERDO -->
    <div class="container">
        <div class="left">
            <h1>Recuperar senha</h1>
            <p>Esqueceu a senha ? redefina ela pelo link</p>
        </div>

        <!-- LADO DIREITO -->

        <div class="right">
            <h2>esqueci minha senha</h2>

            <form>
                <!-- CAMPO DE EMAIL -->
                <div class="form-group">
                    <input type="email" placeholder="Digite seu e-mail">
                </div>

                <!-- BOTÃO -->
                <button class="btn">Enviar link de recuperação</button>
            </form>

            <!-- LINKS -->
            <div class="links">
                <a href="entrar.html">Voltar para login</a>
            </div>

        </div>
        
    </div>
</body>
</html>
